<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeAI — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

  <!-- Animated grid background -->
  <div class="grid-bg"></div>
  <div class="scanline"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="card-glow"></div>

      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="4" width="36" height="44" rx="4" stroke="#00f7ff" stroke-width="2" fill="none"/>
            <rect x="8" y="4" width="36" height="44" rx="4" fill="url(#grad1)" opacity="0.1"/>
            <line x1="16" y1="16" x2="36" y2="16" stroke="#00f7ff" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="24" x2="36" y2="24" stroke="#9d00ff" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="32" x2="28" y2="32" stroke="#00f7ff" stroke-width="2" stroke-linecap="round"/>
            <circle cx="46" cy="46" r="10" fill="#0f0f1a" stroke="#9d00ff" stroke-width="2"/>
            <path d="M43 46l2 2 4-4" stroke="#00f7ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#00f7ff"/>
                <stop offset="100%" stop-color="#9d00ff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="logo-text">RESUME<span class="neon-cyan">AI</span></h1>
        <p class="logo-sub">Intelligent ATS Analysis Platform</p>
      </div>

      <div class="form-section">
        <div class="input-group">
          <label class="input-label">EMAIL ADDRESS</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="email" class="neon-input" placeholder="user@example.com" autocomplete="off"/>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">PASSWORD</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="password" class="neon-input" placeholder="••••••••" />
            <span class="toggle-pw" onclick="togglePassword()" title="Show/Hide">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>

        <div class="error-msg" id="error-msg">⚠ Please fill in all fields</div>

        <button class="login-btn" id="login-btn" onclick="handleLogin()">
          <span class="btn-text">ACCESS SYSTEM</span>
          <span class="btn-glow"></span>
          <span class="btn-arrow">→</span>
        </button>

        <p class="hint-text">✦ Any credentials accepted for demo</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Generate particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 6 + 's';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      container.appendChild(p);
    }
  </script>
</body>
</html>
